<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seshat — Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="/cdn/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: { DEFAULT: '#eef2e3', dark: '#d5dcc5' },
                        forest: { DEFAULT: '#043f2e', mid: '#2a6f2b', light: '#e8f0ec' },
                        gold: { DEFAULT: '#C9A84C', light: '#DFC46A' },
                        terracota: '#B66A50',
                        charcoal: '#3f3f3f',
                        paper: '#fcfcfc',
                        stone: { veil: '#d3cec5', gray: '#8B8589' },
                        granate: { DEFAULT: '#5B2C3E', dark: '#3D1D2A' },
                    },
                    fontFamily: {
                        serif: ['Noto Serif', 'Georgia', 'serif'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center font-sans antialiased"
      style="background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 30%, #cbd5e1 60%, #94a3b8 100%);">
    <div class="bg-white/90 backdrop-blur-md rounded-2xl p-8 w-full max-w-sm mx-4 shadow-lg border border-white/50 anime-fade">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-slate-800/20">
                <span class="material-symbols-outlined text-3xl text-emerald-400">church</span>
            </div>
            <h1 class="text-2xl font-serif font-bold text-slate-800">Seshat</h1>
            <p class="text-slate-500 text-xs mt-1">Parroquia María Misionera</p>
        </div>
        <form method="post" th:action="@{/login}" class="flex flex-col gap-4">
            <div th:if="${param.error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-2.5 rounded-xl text-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">error</span>
                Usuario o contraseña incorrectos
            </div>
            <div th:if="${param.logout}" class="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-2.5 rounded-xl text-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">check_circle</span>
                Sesión cerrada correctamente
            </div>
            <div>
                <label class="block text-slate-600 text-sm font-medium mb-1.5">Usuario</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">person</span>
                    <input type="text" name="username" required autofocus
                           class="w-full border border-slate-300 rounded-xl pl-10 pr-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800 placeholder:text-slate-400">
                </div>
            </div>
            <div>
                <label class="block text-slate-600 text-sm font-medium mb-1.5">Contraseña</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
                    <input type="password" name="password" required
                           class="w-full border border-slate-300 rounded-xl pl-10 pr-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800 placeholder:text-slate-400">
                </div>
            </div>
            <button type="submit"
                    class="btn bg-emerald-600 text-white font-semibold py-2.5 rounded-xl hover:bg-emerald-500 transition-all text-sm mt-2 shadow-sm hover:shadow-md hover:shadow-emerald-500/20">
                Ingresar
            </button>
        </form>
    </div>
</body>
</html>
