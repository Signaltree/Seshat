<div class="bg-white rounded-2xl p-6 max-w-2xl mx-auto shadow-sm border border-slate-200/60 card" th:fragment="formulario">
    <h2 class="text-xl font-serif font-bold text-slate-800 mb-6" th:if="${confirmacion.id == 0}">Nueva Confirmación</h2>
    <h2 class="text-xl font-serif font-bold text-slate-800 mb-6" th:unless="${confirmacion.id == 0}">Editar Confirmación</h2>
    <form hx-post="/confirmaciones/guardar" hx-target="#main-content" class="grid grid-cols-2 gap-4">
        <input type="hidden" name="id" th:value="${confirmacion.id}">
        <div class="col-span-2">
            <label class="block text-slate-600 text-sm font-medium mb-1.5">Persona</label>
            <select name="persona_id" required
                    class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800">
                <option value="" class="text-slate-400">Seleccione una persona</option>
                <option th:each="p : ${personas}" th:value="${p.id}" th:text="${p.nombres} + ' ' + ${p.apellidos}"
                        th:selected="${confirmacion.persona_id == p.id}"></option>
            </select>
        </div>
        <div>
            <label class="block text-slate-600 text-sm font-medium mb-1.5">Fecha Confirmación</label>
            <input type="date" name="fecha_confirmacion" th:value="${confirmacion.fecha_confirmacion}" required
                   class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800">
        </div>
        <div>
            <label class="block text-slate-600 text-sm font-medium mb-1.5">Guía</label>
            <input type="text" name="guia" th:value="${confirmacion.guia}"
                   class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800 placeholder:text-slate-400">
        </div>
        <div>
            <label class="block text-slate-600 text-sm font-medium mb-1.5">Parroquia</label>
            <input type="text" name="parroquia" th:value="${confirmacion.parroquia}"
                   class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800 placeholder:text-slate-400">
        </div>
        <div>
            <label class="block text-slate-600 text-sm font-medium mb-1.5">N° Libro</label>
            <input type="text" name="n_libro" th:value="${confirmacion.n_libro}"
                   class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800 placeholder:text-slate-400">
        </div>
        <div>
            <label class="block text-slate-600 text-sm font-medium mb-1.5">N° Folio</label>
            <input type="text" name="n_folio" th:value="${confirmacion.n_folio}"
                   class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800 placeholder:text-slate-400">
        </div>
        <div class="col-span-2 flex gap-3 mt-4">
            <button type="submit" class="btn flex items-center gap-1.5 bg-emerald-600 text-white font-medium px-6 py-2.5 rounded-xl hover:bg-emerald-500 transition-all text-sm shadow-sm hover:shadow-md hover:shadow-emerald-500/20">
                <span class="material-symbols-outlined text-lg">save</span>
                Guardar
            </button>
            <a href="/confirmaciones" hx-get="/confirmaciones" hx-target="#main-content"
               class="btn flex items-center gap-1.5 bg-transparent border border-slate-300 text-slate-700 px-6 py-2.5 rounded-xl hover:bg-slate-100 transition-all text-sm">
                Cancelar
            </a>
        </div>
    </form>
    <div th:if="${confirmacion.id != 0}"
         th:attr="hx-get=@{/padrinos/fragmento/CONFIRMACION/{id}(id=${confirmacion.id})}"
         hx-trigger="load"
         hx-target="this"
         hx-swap="outerHTML">
    </div>
    <div th:if="${confirmacion.id != 0}"
         th:attr="hx-get=@{/certificados/fragmento/CONFIRMACION/{id}(id=${confirmacion.id}, personaId=${confirmacion.persona_id})}"
         hx-trigger="load"
         hx-target="this"
         hx-swap="outerHTML">
    </div>
</div>
