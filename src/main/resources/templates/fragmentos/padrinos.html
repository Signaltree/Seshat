<div class="padrinos-section col-span-2 mt-6 border-t border-slate-200 pt-6" th:fragment="padrinos" xmlns:th="http://www.thymeleaf.org">
    <h3 class="text-lg font-serif font-bold text-slate-800 mb-3">Padrinos</h3>
    <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-3 py-2.5 rounded-xl mb-3 text-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-lg">error</span>
        <span th:text="${error}"></span>
    </div>
    <div th:if="${erroresPadrino != null and !erroresPadrino.isEmpty()}" class="bg-red-50 border border-red-200 text-red-700 px-3 py-2.5 rounded-xl mb-3 text-sm">
        <ul class="list-disc list-inside">
            <li th:each="err : ${erroresPadrino}" th:text="${err.value}"></li>
        </ul>
    </div>
    <div class="space-y-2 mb-4">
        <div th:each="padrino : ${padrinos}" class="flex items-center justify-between bg-slate-50 px-4 py-2.5 rounded-xl">
            <div>
                <span class="text-sm font-medium text-slate-800" th:text="${padrino.nombres} + ' ' + ${padrino.apellidos}"></span>
                <span th:if="${padrino.rut}" class="text-slate-500 text-xs ml-2" th:text="'(' + ${padrino.rut} + ')'"></span>
                <span class="inline-block bg-emerald-100 text-emerald-700 text-xs px-2.5 py-0.5 rounded-full ml-2 font-medium" th:text="${roles[padrino.id]}"></span>
            </div>
            <button th:attr="hx-delete=@{/padrinos/{id}/{tipo}/{sacramentoId}(id=${padrino.id}, tipo=${tipo}, sacramentoId=${entidadId})}"
                    hx-target="closest .padrinos-section" hx-swap="outerHTML"
                    hx-confirm="¿Eliminar este padrino?"
                    class="btn flex items-center gap-1 text-sm text-slate-500 hover:text-red-600 transition-all duration-200 cursor-pointer">
                <span class="material-symbols-outlined text-base">delete</span>
                Eliminar
            </button>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(padrinos)}" class="text-slate-400 text-sm italic mb-4">Sin padrinos registrados</div>
    <form th:attr="hx-post=@{/padrinos/agregar}" hx-target="closest .padrinos-section" hx-swap="outerHTML"
          class="grid grid-cols-2 md:grid-cols-4 gap-3 p-4 bg-slate-50 rounded-xl">
        <input type="hidden" name="tipo" th:value="${tipo}">
        <input type="hidden" name="entidadId" th:value="${entidadId}">
        <div>
            <label class="block text-xs text-slate-500 mb-1">Nombres</label>
            <input type="text" name="nombres" required
                   class="w-full border border-slate-300 rounded-xl px-2.5 py-1.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800">
        </div>
        <div>
            <label class="block text-xs text-slate-500 mb-1">Apellidos</label>
            <input type="text" name="apellidos" required
                   class="w-full border border-slate-300 rounded-xl px-2.5 py-1.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800">
        </div>
        <div>
            <label class="block text-xs text-slate-500 mb-1">RUT</label>
            <input type="text" name="rut" placeholder="XX.XXX.XXX-X"
                   class="w-full border border-slate-300 rounded-xl px-2.5 py-1.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800 placeholder:text-slate-400">
        </div>
        <div>
            <label class="block text-xs text-slate-500 mb-1">Rol</label>
            <select name="rol" required
                    class="w-full border border-slate-300 rounded-xl px-2.5 py-1.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800"
                    onchange="var el=this.parentElement.querySelector('input[name=rolOtro]');if(el)el.style.display=this.value==='Otro'?'block':'none'">
                <option value="">Seleccione</option>
                <option value="Padrino" th:if="${tipo == 'BAUTIZO' or tipo == 'CONFIRMACION'}">Padrino</option>
                <option value="Madrina" th:if="${tipo == 'BAUTIZO' or tipo == 'CONFIRMACION'}">Madrina</option>
                <option value="Testigo" th:if="${tipo == 'MATRIMONIO'}">Testigo</option>
                <option value="Otro">Otro...</option>
            </select>
            <input type="text" name="rolOtro" placeholder="Especifique rol"
                   style="display:none"
                   class="w-full border border-slate-300 rounded-xl px-2.5 py-1.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800 placeholder:text-slate-400 mt-1">
        </div>
        <div class="col-span-2 md:col-span-4 flex justify-end mt-2">
            <button type="submit" class="btn flex items-center gap-1 bg-emerald-600 text-white font-medium px-5 py-1.5 rounded-xl hover:bg-emerald-500 transition-all text-sm shadow-sm hover:shadow-md">
                <span class="material-symbols-outlined text-base">add</span>
                Agregar Padrino
            </button>
        </div>
    </form>
</div>
