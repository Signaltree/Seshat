<div class="fotos-section col-span-2 mt-6 border-t border-slate-200 pt-6" th:fragment="fotos" xmlns:th="http://www.thymeleaf.org">
    <h3 class="text-lg font-serif font-bold text-slate-800 mb-3">Fotos</h3>
    <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-3 py-2.5 rounded-xl mb-3 text-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-lg">error</span>
        <span th:text="${error}"></span>
    </div>
    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3 mb-4">
        <div th:each="foto : ${fotos}" class="relative group">
            <a th:href="@{/fotos/{id}/archivo(id=${foto.id})}" target="_blank">
                <img th:src="@{/fotos/{id}/archivo(id=${foto.id})}"
                     class="w-full h-32 object-cover rounded-xl transition shadow-sm"
                     th:alt="${foto.descripcion} ?: 'Foto'">
            </a>
            <div th:if="${foto.descripcion}" class="text-xs text-slate-500 mt-1 truncate px-1" th:text="${foto.descripcion}"></div>
            <button th:attr="hx-delete=@{/fotos/{id}(id=${foto.id}, personaId=${personaId})}"
                    hx-target="closest .fotos-section" hx-swap="outerHTML"
                    hx-confirm="¿Eliminar esta foto?"
                    class="absolute top-1 right-1 bg-red-500 text-white rounded-full w-6 h-6 text-xs opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center cursor-pointer hover:bg-red-700 shadow-sm">
                <span class="material-symbols-outlined text-sm">close</span>
            </button>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(fotos)}" class="text-slate-400 text-sm italic mb-4">Sin fotos</div>
    <form th:attr="hx-post=@{/fotos/subir}" hx-target="closest .fotos-section" hx-swap="outerHTML"
          hx-encoding="multipart/form-data" enctype="multipart/form-data" class="flex items-end gap-3 flex-wrap">
        <input type="hidden" name="personaId" th:value="${personaId}">
        <div>
            <label class="block text-xs text-slate-500 mb-1">Descripción</label>
            <input type="text" name="descripcion" class="border border-slate-300 rounded-xl px-2.5 py-1.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800">
        </div>
        <div>
            <label class="block text-xs text-slate-500 mb-1">Fecha de la foto</label>
            <input type="date" name="fechaFoto" class="border border-slate-300 rounded-xl px-2.5 py-1.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors bg-white text-slate-800">
        </div>
        <div>
            <label class="block text-xs text-slate-500 mb-1">Archivo</label>
            <input type="file" name="archivo" accept=".jpg,.jpeg,.png,.gif" required
                   class="text-sm text-slate-700 file:mr-3 file:py-1.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:bg-emerald-600 file:text-white file:font-medium hover:file:bg-emerald-500 file:cursor-pointer file:transition-colors">
        </div>
        <button type="submit" class="btn flex items-center gap-1 bg-slate-800 text-white font-medium px-4 py-1.5 rounded-xl hover:bg-slate-700 transition-all text-sm shadow-sm cursor-pointer">
            <span class="material-symbols-outlined text-base">upload</span>
            Subir
        </button>
    </form>
</div>
