<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seshat — Parroquia María Misionera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="/cdn/tailwind.min.js"></script>
    <script src="/cdn/htmx.min.js"></script>
    <script src="/cdn/anime.min.js"></script>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <style>
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        ::selection { background: #10b98144; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }

        .btn {
            position: relative;
            overflow: hidden;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        .btn:active { transform: scale(0.97); }

        .nav-active {
            background: rgba(16,185,129,0.15) !important;
            color: #ecfdf5 !important;
        }

        input:focus, select:focus, textarea:focus {
            box-shadow: 0 0 0 3px rgba(16,185,129,0.12), 0 1px 2px rgba(0,0,0,0.04) !important;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anime-fade {
            opacity: 0;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
                        emerald: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
                        amber: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' },
                    },
                    fontFamily: {
                        serif: ['Noto Serif', 'Georgia', 'serif'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex font-sans antialiased text-slate-800">
    <!-- Mobile header -->
    <div class="lg:hidden fixed top-0 left-0 right-0 z-50 bg-slate-800 text-white px-4 py-3 flex items-center justify-between shadow-lg">
        <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')" class="p-1 hover:opacity-80 transition-opacity">
            <span class="material-symbols-outlined text-2xl">menu</span>
        </button>
        <span class="font-serif text-lg font-semibold tracking-tight">Seshat</span>
        <div class="w-8"></div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-slate-800 text-white min-h-screen p-6 flex flex-col fixed lg:static z-40 -translate-x-full lg:translate-x-0 transition-all duration-300 ease-out pt-16 lg:pt-6 shadow-[2px_0_20px_rgba(0,0,0,0.08)]">
        <div class="text-center mb-8">
            <a href="/" hx-get="/inicio" hx-target="#main-content" hx-swap="innerHTML" class="block">
                <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-lg shadow-emerald-600/20 hover:bg-emerald-500 transition-colors cursor-pointer">
                    <span class="material-symbols-outlined text-xl text-white">church</span>
                </div>
            </a>
            <h1 class="font-serif text-2xl font-bold tracking-tight">Seshat</h1>
            <p class="text-slate-400 text-[11px] mt-1 tracking-[0.12em] uppercase font-medium">Parroquia María Misionera</p>
        </div>
        <nav class="flex flex-col gap-1 flex-1" id="sidebar-nav">
            <a href="/dashboard" hx-get="/dashboard" hx-target="#main-content" hx-swap="innerHTML"
               onclick="closeSidebar()"
               class="btn flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/60 transition-all duration-200 text-sm font-medium">
                <span class="material-symbols-outlined text-[20px]">monitoring</span>
                <span>Dashboard</span>
            </a>
            <a href="/personas" hx-get="/personas" hx-target="#main-content" hx-swap="innerHTML"
               onclick="closeSidebar()"
               class="btn flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/60 transition-all duration-200 text-sm font-medium">
                <span class="material-symbols-outlined text-[20px]">group</span>
                <span>Personas</span>
            </a>
            <a href="/bautizos" hx-get="/bautizos" hx-target="#main-content" hx-swap="innerHTML"
               onclick="closeSidebar()"
               class="btn flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/60 transition-all duration-200 text-sm font-medium">
                <span class="material-symbols-outlined text-[20px]">water_drop</span>
                <span>Bautizos</span>
            </a>
            <a href="/confirmaciones" hx-get="/confirmaciones" hx-target="#main-content" hx-swap="innerHTML"
               onclick="closeSidebar()"
               class="btn flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/60 transition-all duration-200 text-sm font-medium">
                <span class="material-symbols-outlined text-[20px]">spa</span>
                <span>Confirmaciones</span>
            </a>
            <a href="/matrimonios" hx-get="/matrimonios" hx-target="#main-content" hx-swap="innerHTML"
               onclick="closeSidebar()"
               class="btn flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/60 transition-all duration-200 text-sm font-medium">
                <span class="material-symbols-outlined text-[20px]">favorite</span>
                <span>Matrimonios</span>
            </a>
        </nav>
        <div class="pt-4 border-t border-slate-700/50">
            <p class="text-xs text-slate-500 text-center" th:text="${#authentication.name}">admin</p>
            <form method="post" th:action="@{/logout}" class="mt-2">
                <button type="submit" class="btn w-full flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-red-500/20 transition-all duration-200 text-sm">
                    <span class="material-symbols-outlined text-lg">logout</span>
                    Cerrar Sesión
                </button>
            </form>
        </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="overlay" onclick="closeSidebar()" class="lg:hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-30 hidden transition-opacity duration-300"></div>

    <!-- Main content -->
    <main id="main-content" class="flex-1 p-6 lg:p-10 pt-20 lg:pt-10 min-h-screen relative overflow-hidden">
        <div class="text-center flex items-center justify-center min-h-[80vh] anime-fade relative z-10">
            <div class="max-w-sm mx-auto">
                <div class="w-16 h-16 bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg shadow-emerald-600/10 flex items-center justify-center mx-auto mb-6 border border-white/60">
                    <span class="material-symbols-outlined text-3xl text-emerald-600">church</span>
                </div>
                <div class="bg-white/70 backdrop-blur-md rounded-2xl p-5 shadow-sm border border-white/50 inline-block">
                    <p class="text-xl font-serif font-semibold text-slate-800">Bienvenido a Seshat</p>
                    <p class="text-slate-500 text-sm mt-1">Seleccione una opción del menú</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function closeSidebar() {
            var el = document.getElementById('sidebar');
            if (el) el.classList.add('-translate-x-full');
        }

        var sb = document.getElementById('sidebar');
        var ov = document.getElementById('overlay');
        if (sb && ov) sb.addEventListener('transitionstart', function() {
            ov.classList.toggle('hidden', this.classList.contains('-translate-x-full'));
        });

        document.body.addEventListener('htmx:configRequest', function(evt) {
            var h = document.querySelector('meta[name="_csrf_header"]');
            var t = document.querySelector('meta[name="_csrf"]');
            if (h && t) evt.detail.headers[h.content] = t.getAttribute('content');
        });

        document.body.addEventListener('htmx:afterSwap', function() {
            var nav = document.getElementById('sidebar-nav');
            if (!nav) return;
            nav.querySelectorAll('a').forEach(function(a) {
                a.classList.remove('nav-active');
            });
            var path = window.location.pathname;
            nav.querySelectorAll('a').forEach(function(a) {
                var href = a.getAttribute('href');
                if (href && path.startsWith(href) && href !== '/') {
                    a.classList.add('nav-active');
                }
            });
            anime({
                targets: '#main-content > .anime-fade, #main-content .card, #main-content tr, #main-content .stat-card',
                opacity: [0, 1],
                translateY: [16, 0],
                easing: 'easeOutCubic',
                duration: 400,
                delay: anime.stagger(50, {from: 'first'})
            });
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                var form = e.target.closest('form[hx-post]');
                if (form && !e.shiftKey) {
                    e.preventDefault();
                    form.dispatchEvent(new Event('submit', { bubbles: true }));
                }
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            anime({ targets: '.anime-fade', opacity: [0, 1], translateY: [16, 0], easing: 'easeOutCubic', duration: 500 });
        });
    </script>

</body>
</html>
